apiVersion: apps/v1
kind: Deployment
metadata:
  name: seafile
  labels:
    app: seafile
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: seafile
  template:
    metadata:
      labels:
        app: seafile
    spec:
      # Pin to the SAME node as MariaDB (local-path PVCs are node-bound). Fill in:
      # nodeSelector:
      #   kubernetes.io/hostname: <node-name>
      containers:
        - name: seafile
          image: seafileltd/seafile-mc:12.0.14
          env:
            # --- DB connection: env var names MUST match what setup-seafile-mysql.py
            #     reads (MYSQL_*, not DB_* / SEAFILE_MYSQL_DB_*). This was the bug. ---
            - name: MYSQL_HOST
              value: seafile-mariadb
            - name: MYSQL_PORT
              value: "3306"
            - name: MYSQL_USER
              value: seafile
            - name: MYSQL_USER_PASSWD
              valueFrom:
                secretKeyRef:
                  name: seafile-secrets
                  key: SEAFILE_MYSQL_DB_PASSWORD
            - name: MYSQL_USER_HOST
              value: "%"
            - name: MYSQL_ROOT_PASSWD
              valueFrom:
                secretKeyRef:
                  name: seafile-secrets
                  key: MYSQL_ROOT_PASSWORD
            # database names the setup script expects
            - name: CCNET_DB
              value: ccnet_db
            - name: SEAFILE_DB
              value: seafile_db
            - name: SEAHUB_DB
              value: seahub_db
            # --- App config ---
            - name: JWT_PRIVATE_KEY
              valueFrom:
                secretKeyRef:
                  name: seafile-secrets
                  key: JWT_PRIVATE_KEY
            - name: SEAFILE_SERVER_HOSTNAME
              value: seafile.k3s.syntaxandsymbols.com
            - name: SEAFILE_SERVER_PROTOCOL
              value: https
            - name: TIME_ZONE
              value: America/New_York
            - name: INIT_SEAFILE_ADMIN_EMAIL
              valueFrom:
                secretKeyRef:
                  name: seafile-secrets
                  key: SEAFILE_ADMIN_EMAIL
            - name: INIT_SEAFILE_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: seafile-secrets
                  key: SEAFILE_ADMIN_PASSWORD
            - name: CACHE_PROVIDER
              value: redis
            - name: REDIS_HOST
              value: seafile-redis
            - name: REDIS_PORT
              value: "6379"
          ports:
            - containerPort: 80
          # Probe a lightweight endpoint that returns 200 (NOT "/", which 302s to
          # the login page and times out -> the original 0/1 readiness hang).
          readinessProbe:
            httpGet:
              path: /api2/ping/
              port: 80
            initialDelaySeconds: 60
            periodSeconds: 15
            timeoutSeconds: 10
            failureThreshold: 12
          volumeMounts:
            - name: data
              mountPath: /shared
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              memory: 2Gi
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: seafile-data
---
apiVersion: v1
kind: Service
metadata:
  name: seafile
spec:
  selector:
    app: seafile
  ports:
    - port: 80
      targetPort: 80
