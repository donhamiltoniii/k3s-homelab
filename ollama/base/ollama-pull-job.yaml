apiVersion: batch/v1
kind: Job
metadata:
  name: ollama-pull
  namespace: ollama
spec:
  template:
    spec:
      restartPolicy: OnFailure
      initContainers:
        - name: wait-for-ollama
          image: busybox
          command:
            - sh
            - -c
            - |
              until wget -qO- http://ollama:11434; do
                echo "Waiting for ollama..."
                sleep 3
              done
      containers:
        - name: pull
          image: ollama/ollama:latest
          command:
            - ollama
            - pull
            - llama3.2
          env:
            - name: OLLAMA_HOST
              value: http://ollama:11434
