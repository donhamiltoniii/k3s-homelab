apiVersion: apps/v1
kind: Deployment
metadata:
  name: homepage
  namespace: homepage
  labels:
    app.kubernetes.io/name: homepage
spec:
  revisionHistoryLimit: 3
  replicas: 1
  strategy:
    type: RollingUpdate
  selector:
    matchLabels:
      app.kubernetes.io/name: homepage
  template:
    metadata:
      labels:
        app.kubernetes.io/name: homepage
    spec:
      serviceAccountName: homepage
      automountServiceAccountToken: true
      containers:
        - name: homepage
          image: ghcr.io/gethomepage/homepage:v1.5.0
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 3000
              protocol: TCP
          env:
            # Required since v1.x: comma-separated list of hosts allowed to
            # reach the app. Set to your tunnel hostname (and the in-cluster
            # service if you ever curl it directly).
            - name: HOMEPAGE_ALLOWED_HOSTS
              value: homepage.k3s.syntaxandsymbols.com
            - name: HOMEPAGE_VAR_IMMICH_KEY
              valueFrom:
                secretKeyRef:
                  name: homepage-secrets
                  key: IMMICH_KEY
            - name: HOMEPAGE_VAR_HASS_TOKEN
              valueFrom:
                secretKeyRef:
                  name: homepage-secrets
                  key: HASS_TOKEN
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              memory: 256Mi
          livenessProbe:
            httpGet:
              path: /api/healthcheck
              port: http
              httpHeaders:
                - name: Host
                  value: localhost:3000
          readinessProbe:
            httpGet:
              path: /api/healthcheck
              port: http
              httpHeaders:
                - name: Host
                  value: localhost:3000
          volumeMounts:
            - name: config
              mountPath: /app/config
            - name: logs
              mountPath: /app/config/logs
      volumes:
        - name: config
          configMap:
            name: homepage-config
        - name: logs
          emptyDir: {}
