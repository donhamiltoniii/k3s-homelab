- Infrastructure:
    - ArgoCD:
        icon: argocd.png
        href: https://argocd.syntaxandsymbols.com
        description: GitOps continuous delivery
        namespace: argocd
        app: argocd-server
    - Uptime Kuma:
        icon: uptime-kuma.png
        href: https://uptime.syntaxandsymbols.com
        description: Service monitoring
        namespace: uptime-kuma
        app: uptime-kuma
        widget:
          type: uptimekuma
          url: http://uptime-kuma.uptime-kuma.svc.cluster.local:3001
          slug: default
    - Ollama:
        icon: ollama.png
        href: http://192.168.0.52:11434
        description: Local LLM inference (Qwen3)
        namespace: ollama
        app: ollama

- Media & Files:
    - Immich:
        icon: immich.png
        href: https://immich.syntaxandsymbols.com
        description: Photo & video management
        namespace: immich
        app: immich-server
        widget:
          type: immich
          url: http://immich-server.immich.svc.cluster.local:2283
          key: "{{HOMEPAGE_VAR_IMMICH_KEY}}"
          version: 2
    - Vaultwarden:
        icon: vaultwarden.png
        href: https://vault.syntaxandsymbols.com
        description: Password manager
        namespace: vaultwarden
        app: vaultwarden

- Home:
    - Home Assistant:
        icon: home-assistant.png
        href: https://hass.syntaxandsymbols.com
        description: Home automation
        namespace: home-assistant
        app: home-assistant
        widget:
          type: homeassistant
          url: http://home-assistant.home-assistant.svc.cluster.local:8123
          key: "{{HOMEPAGE_VAR_HASS_TOKEN}}"
