- Infrastructure:
    - ArgoCD:
        icon: argocd
        href: https://argocd.example.com
        description: GitOps continuous delivery
        widget:
          type: argocd
          url: http://argocd-server.argocd.svc.cluster.local
          key: "{{HOMEPAGE_VAR_ARGOCD_TOKEN}}"
    - Uptime Kuma:
        href: https://uptime.k3s.syntaxandsymbols.com
        icon: uptime-kuma.png
        widget:
          type: uptimekuma
          url: http://uptime.uptime.svc.cluster.local
          slug: homelab
    - Gitea:
        icon: gitea.png
        href: https://gitea.k3s.syntaxandsymbols.com
        description: Self-hosted Git
        widget:
          type: gitea
          url: http://gitea-service.gitea.svc.cluster.local:3000
          key: "{{HOMEPAGE_VAR_GITEA_TOKEN}}"

- Media & Files:
    - Immich:
        icon: immich.png
        href: https://immich.k3s.syntaxandsymbols.com
        description: Photo & video management
        widget:
          type: immich
          url: http://immich-server.immich.svc.cluster.local
          key: "{{HOMEPAGE_VAR_IMMICH_KEY}}"
          version: 2
    - Vaultwarden:
        icon: vaultwarden.png
        href: https://vault.syntaxandsymbols.com
        description: Password manager
    - Seafile:
        icon: seafile.png
        href: https://seafile.k3s.syntaxandsymbols.com
        description: File sync & storage

- Dev & Automation:
    - n8n:
        icon: n8n.png
        href: https://n8n.syntaxandsymbols.com
        description: Workflow automation
    - Wiki.js:
        icon: wikijs.png
        href: https://wiki.syntaxandsymbols.com
        description: Knowledge base
    - Ollama:
        icon: ollama.png
        href: http://192.168.0.52:11434
        description: Local LLM inference (Qwen3)
    - Open WebUI:
        icon: open-webui.png
        href: https://openwebui.k3s.syntaxandsymbols.com
        description: Chat interface for Ollama

- Home:
    - Home Assistant:
        icon: home-assistant.png
        href: https://homeassistant.k3s.syntaxandsymbols.com
        description: Home automation
        widget:
          type: homeassistant
          url: http://home-assistant.homeassistant.svc.cluster.local
          key: "{{HOMEPAGE_VAR_HASS_TOKEN}}"
