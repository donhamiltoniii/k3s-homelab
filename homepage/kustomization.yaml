apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: homepage

resources:
  - namespace.yaml
  - serviceaccount.yaml
  - rbac.yaml
  - deployment.yaml
  - service.yaml
  - ingress.yaml

configMapGenerator:
  - name: homepage-config
    files:
      - config/kubernetes.yaml
      - config/settings.yaml
      - config/widgets.yaml
      - config/services.yaml
      - config/bookmarks.yaml
      - config/docker.yaml

# Hash suffix on the generated ConfigMap rolls the Deployment automatically
# whenever any config file changes. Keep this true (the default).
generatorOptions:
  disableNameSuffixHash: false

labels:
  - pairs:
      app.kubernetes.io/part-of: homepage
    includeSelectors: false

images:
  - name: ghcr.io/gethomepage/homepage
    newTag: v1.5.0
